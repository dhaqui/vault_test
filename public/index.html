<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PayPal Vault - Shipping Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 24px;
    }
    .container { max-width: 720px; margin: 0 auto; }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,.08);
    }
    h1 { margin-bottom: 6px; }
    h2 { font-size: 16px; margin-bottom: 14px; color: #333; }
    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 6px;
    }
    .mode-card {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .mode-card:hover { border-color: #667eea; background: #f8f7ff; }
    .mode-card.selected { border-color: #667eea; background: #f0eeff; }
    .mode-card .icon { font-size: 24px; margin-bottom: 6px; }
    .mode-card .title { font-weight: bold; font-size: 13px; margin-bottom: 4px; }
    .mode-card .desc { font-size: 11px; color: #666; line-height: 1.4; }
    .mode-card .tag {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
    }
    .tag-green  { background: #e8f5e9; color: #2e7d32; }
    .tag-red    { background: #fce4ec; color: #c62828; }
    .tag-yellow { background: #fff8e1; color: #f57f17; }
    .result-box {
      margin-top: 10px;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
    }
    .result-oneclick  { background: #e8f5e9; color: #2e7d32; }
    .result-modal     { background: #fff8e1; color: #f57f17; }
    .result-pending   { background: #f5f7fa; color: #888; }
    .info-box {
      background: #f5f7fa;
      border-left: 4px solid #667eea;
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .info-box .label { font-weight: bold; color: #444; margin-bottom: 4px; }
    .info-box .value { font-family: monospace; color: #555; word-break: break-all; }
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
    .alert-success { background: #d4edda; color: #155724; }
    .alert-info    { background: #d1ecf1; color: #0c5460; }
    .alert-danger  { background: #f8d7da; color: #721c24; }
    .debug-log {
      background: #0b1220;
      color: #d4d4d4;
      padding: 12px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      max-height: 320px;
      overflow-y: auto;
      line-height: 1.7;
    }
    .debug-log .ts      { color: #608b4e; }
    .debug-log .success { color: #4ec9b0; }
    .debug-log .error   { color: #f48771; }
    .debug-log .info    { color: #9cdcfe; }
    .debug-log .vault   { color: #dcdcaa; font-weight: bold; }
    #paypal-button-container { min-height: 50px; }
    .clear-btn {
      display: block;
      margin: 8px auto 0;
      padding: 10px 28px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .clear-btn:hover { background: #c62828; }
    pre {
      background: #f5f7fa;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 12px;
    }
    code { background: #eef2f6; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
<div class="container">

  <div class="card">
    <h1>💳 PayPal Vault - Shipping Test</h1>
    <p style="color:#666;font-size:14px;margin-top:6px">
      住所設定とワンクリック・Seller Protectionの関係を検証します
    </p>
  </div>

  <!-- 保存済み情報 -->
  <div id="saved-section" style="display:none">
    <div class="card">
      <h2>👤 保存済みVault情報</h2>
      <div id="saved-content"></div>
    </div>
  </div>

  <!-- モード選択 -->
  <div class="card">
    <h2>🧪 テストモード選択</h2>
    <div class="mode-grid" style="grid-template-columns: repeat(2, 1fr)">

      <div class="mode-card selected" data-mode="no_shipping" onclick="selectMode('no_shipping', this)">
        <div class="icon">🚫</div>
        <div class="title">住所なし</div>
        <div class="desc"><code>NO_SHIPPING</code><br>住所を渡さない</div>
      </div>

      <div class="mode-card" data-mode="set_provided" onclick="selectMode('set_provided', this)">
        <div class="icon">📦</div>
        <div class="title">住所あり</div>
        <div class="desc"><code>SET_PROVIDED_ADDRESS</code><br>住所を渡す</div>
      </div>

    </div>

    <!-- 判定結果 -->
    <div id="mode-result" class="result-box result-pending">
      ボタンをクリックすると結果が表示されます
    </div>
  </div>

  <!-- ログ -->
  <div class="card">
    <h2>📋 ログ</h2>
    <div class="debug-log" id="log-area"><span class="info">初期化中...</span></div>
  </div>

  <div id="status"></div>

  <!-- PayPal ボタン -->
  <div class="card">
    <h2 id="btn-title">PayPalで支払う</h2>
    <p id="btn-desc" style="font-size:13px;color:#666;margin-bottom:14px"></p>
    <div id="paypal-button-container"></div>
  </div>

  <div id="result-section" style="display:none">
    <div class="card">
      <h2>📄 Captureレスポンス</h2>
      <pre id="result-json"></pre>
    </div>
  </div>

  <button class="clear-btn" onclick="clearData()">🗑️ テストデータをクリア</button>

</div>
<script>
(async () => {

  let customerId = localStorage.getItem('paypal_customer_id') || null;
  let vaultId    = localStorage.getItem('paypal_vault_id')    || null;
  let shippingMode = 'no_shipping'; // デフォルト

  // ワンクリック判定フラグ（onApprove が呼ばれる前にポップアップが開いたかどうか）
  let popupOpened = false;

  function log(msg, type = 'info') {
    const el = document.getElementById('log-area');
    const ts = new Date().toLocaleTimeString('ja-JP', {
      hour:'2-digit', minute:'2-digit', second:'2-digit', fractionalSecondDigits:2
    });
    const div = document.createElement('div');
    div.innerHTML = `<span class="ts">[${ts}]</span> <span class="${type}">${msg}</span>`;
    el.insertBefore(div, el.firstChild);
  }

  function renderSaved() {
    if (!customerId && !vaultId) return;
    document.getElementById('saved-section').style.display = 'block';
    let html = '';
    if (vaultId) {
      html += `<div class="info-box" style="border-left-color:#0070ba">
        <div class="label">🔐 Vault ID</div>
        <div class="value">${vaultId}</div>
      </div>`;
    }
    if (customerId) {
      html += `<div class="info-box">
        <div class="label">Customer ID</div>
        <div class="value">${customerId}</div>
      </div>`;
    }
    document.getElementById('saved-content').innerHTML = html;
  }

  function updateButtonArea() {
    if (customerId) {
      document.getElementById('btn-title').textContent = '🔄 PayPalで支払う（Returning Payer）';
      document.getElementById('btn-desc').textContent = '保存済みアカウントでの決済テストです。';
    } else {
      document.getElementById('btn-title').textContent = '🆕 PayPalで支払う（初回）';
      document.getElementById('btn-desc').textContent = '初回購入でVaultに保存されます。';
    }
  }

  function showStatus(msg, type = 'info') {
    document.getElementById('status').innerHTML =
      `<div class="alert alert-${type}">${msg}</div>`;
  }

  // モード選択
  window.selectMode = (mode, el) => {
    shippingMode = mode;
    document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');

    const modeLabels = {
      no_shipping:  '住所なし・NO_SHIPPING',
      none:         '住所あり・NO_SHIPPING',
      set_provided: '住所あり・SET_PROVIDED_ADDRESS'
    };
    log(`テストモード変更: ${modeLabels[mode]}`, 'vault');

    // 判定リセット
    const r = document.getElementById('mode-result');
    r.className = 'result-box result-pending';
    r.textContent = 'ボタンをクリックすると結果が表示されます';
  };

  // ワンクリック判定結果を表示
  function showClickResult(wasOneClick) {
    const r = document.getElementById('mode-result');
    if (wasOneClick) {
      r.className = 'result-box result-oneclick';
      r.textContent = '✅ ワンクリック成功 — モーダル・ポップアップなしで決済完了';
    } else {
      r.className = 'result-box result-modal';
      r.textContent = '⚠️ フォールバック — モーダル / ポップアップが表示されました';
    }
  }

  // Payment Tokens 確認
  async function checkPaymentTokens() {
    if (!customerId) return;
    try {
      log('Payment Tokens 確認中...');
      const resp = await fetch(`/api/payment-tokens/${encodeURIComponent(customerId)}`);
      const data = await resp.json();
      if (data.payment_tokens?.length > 0) {
        vaultId = data.payment_tokens[0].id;
        localStorage.setItem('paypal_vault_id', vaultId);
        log(`✓ Vault済みトークン確認: ${vaultId}`, 'vault');
        renderSaved();
      }
    } catch (e) {
      log(`Payment Tokens エラー: ${e.message}`, 'error');
    }
  }

  // SDK 読み込み
  async function loadSDK() {
    const cfg = await (await fetch('/api/config')).json();
    const tokenUrl = customerId
      ? `/api/generate-client-token?customer_id=${encodeURIComponent(customerId)}`
      : '/api/generate-client-token';
    const { id_token } = await (await fetch(tokenUrl)).json();
    log(customerId ? 'Returning Payer 用 id_token 取得' : '新規 Payer 用 id_token 取得', 'vault');

    return new Promise((resolve, reject) => {
      const script = document.createElement('script');
      // Returning Payer には vault=true を付けない（ワンクリック条件）
      const vaultParam = customerId ? '' : '&vault=true';
      script.src = `https://www.paypal.com/sdk/js?client-id=${cfg.clientId}&intent=capture${vaultParam}&locale=ja_JP&currency=JPY`;
      script.setAttribute('data-user-id-token', id_token);
      script.onload  = () => { log('✓ PayPal SDK 読み込み完了', 'success'); resolve(); };
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }

  // PayPal ボタン初期化
  function initButtons() {
    paypal.Buttons({
        style: {
          layout: 'vertical',
          color:  'gold',
          shape:  'rect',
          label:  'buynow'
        },
      vault: customerId ? { customer_id: customerId } : undefined,

      onClick: async (data, actions) => {
        // onClick が呼ばれた時点ではまだポップアップが開いていない
        // ここで popupOpened フラグをリセット
        popupOpened = false;
        log(`onClick: shippingMode=${shippingMode}`, 'info');
        return actions.resolve();
      },

      createOrder: async () => {
        log(`Order 作成中... (shippingMode=${shippingMode})`);
        showStatus('注文を作成中...');
        const resp = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ customerId, shippingMode })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || JSON.stringify(data));
        log(`✓ Order 作成: ${data.id}`, 'success');

        // createOrder が返った直後にポップアップが開くかどうかを
        // 少し遅延してチェックする（SDK の挙動を観察）
        setTimeout(() => {
          // window.opener や iframe の存在でポップアップ検知は難しいため
          // onApprove が呼ばれるタイミングで判定する
        }, 100);

        return data.id;
      },

      // onApprove はワンクリック・モーダル両方で呼ばれる
      // data.isPopup などの判定フィールドは SDK が提供していないため
      // createOrder → onApprove の間にユーザー操作があったかをログで観察する
      onApprove: async (data) => {
        log('✓ onApprove 呼び出し（ワンクリック or モーダル承認後）', 'success');
        log(`orderID: ${data.orderID}`, 'info');
        showStatus('決済処理中...');

        const resp    = await fetch(`/api/orders/${data.orderID}/capture`, { method: 'POST' });
        const capture = await resp.json();
        if (!resp.ok) throw new Error(capture.error || JSON.stringify(capture));

        log('✓ Capture 完了', 'success');

        // Seller Protection 確認
        const captures = capture.purchase_units?.[0]?.payments?.captures?.[0];
        const sellerProtection = captures?.seller_protection;
        log('='.repeat(40), 'vault');
        log(`Seller Protection Status: ${sellerProtection?.status || 'N/A'}`, 'vault');
        if (sellerProtection?.dispute_categories) {
          log(`Dispute Categories: ${sellerProtection.dispute_categories.join(', ')}`, 'vault');
        }
        log('='.repeat(40), 'vault');

        // Vault 情報保存
        const vaultInfo    = capture.payment_source?.paypal?.attributes?.vault;
        const paypalSource = capture.payment_source?.paypal;
        if (vaultInfo?.id) {
          vaultId = vaultInfo.id;
          localStorage.setItem('paypal_vault_id', vaultId);
          log(`Vault ID: ${vaultInfo.id}`, 'vault');
        }
        if (vaultInfo?.customer?.id) {
          customerId = vaultInfo.customer.id;
          localStorage.setItem('paypal_customer_id', customerId);
        }
        if (paypalSource?.email_address) {
          log(`Email: ${paypalSource.email_address}`, 'info');
        }

        renderSaved();
        showStatus('✅ 決済完了！', 'success');
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('result-json').textContent = JSON.stringify(capture, null, 2);

        // ワンクリック判定はサーバーログと照合して手動確認
        // （SDK はワンクリック/モーダルの区別を onApprove で通知しない）
        log('⚠️ ワンクリックかモーダルかはブラウザの挙動とサーバーログで確認してください', 'info');

        setTimeout(() => location.reload(), 4000);
      },

      onCancel: () => {
        log('決済がキャンセルされました');
        showStatus('決済がキャンセルされました');
        showClickResult(false); // キャンセル = モーダルが開いた
      },

      onError: (err) => {
        log(`エラー: ${err?.message || JSON.stringify(err)}`, 'error');
        showStatus('エラーが発生しました', 'danger');
      }

    }).render('#paypal-button-container')
      .then(() => {
        log('✓ PayPal ボタン表示完了', 'success');
        if (customerId) log('GetSmartWallet 呼び出し中... ボタンに保存済み情報が表示されるまで待機', 'vault');
      });
  }

  function clearData() {
    if (!confirm('保存データをクリアしますか？')) return;
    localStorage.clear();
    location.reload();
  }

  // 初期化
  log('ページ読み込み完了');
  if (customerId || vaultId) {
    log('--- 保存済みユーザー検出 ---', 'vault');
    if (customerId) log(`Customer ID: ${customerId}`, 'vault');
    if (vaultId)    log(`Vault ID: ${vaultId}`, 'vault');
    renderSaved();
  }

  await checkPaymentTokens();
  updateButtonArea();

  try {
    await loadSDK();
    initButtons();
  } catch (e) {
    log(`初期化エラー: ${e.message}`, 'error');
    showStatus('初期化エラー: ' + e.message, 'danger');
  }

})();
</script>
</body>
</html>
